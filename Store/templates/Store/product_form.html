{% extends 'base.html' %}

{% block title %}Добавить продукт{% endblock %}

{% block content %}

<form method="post" class="contact-form" enctype="multipart/form-data">
    {% csrf_token %}

    {% if messages %}
    <div class="form-messages" style="margin-bottom: 20px;">
        {% for message in messages %}
        <div style="padding: 12px; margin-bottom: 10px; border-radius: 4px;
                            background-color: {% if message.tags == 'error' %}#f8d7da{% else %}#d1e7dd{% endif %};
                            color: {% if message.tags == 'error' %}#842029{% else %}#0f5132{% endif %};
                            border: 1px solid {% if message.tags == 'error' %}#f5c2c7{% else %}#badbcc{% endif %};">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    {{ form.as_p }}
    <div class="btn-wrap">
        <button type="submit" class="btn btn-primary btn-lg">
            Отправить
        </button>
    </div>
</form>

{% endblock %}
